<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de personagem</title>
    <style>
        body{
            background-color: #D3D3D3;
            background-image: url(pedra.wbep);
            font-family: Arial, sans-serif;
        }
        .texto-azul{
            color: rgb(0, 11, 128);
            font-size: 24px;
            font-weight: bold;
        }
        table{
            border: 2px solid black;
            border-collapse: collapse; /*união de bordas*/
            width: 50%;
            margin: 0 auto;
        }
        table td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        img{
            border: 3px solid black;
        }
    </style>
</head>
<body>
        <div style="text-align: center;">
        <p class="texto-azul"> Status do personagem simon "ghost" riley - COD modern warfare</p>
        <table>
            <tr>
                <td colspan="2">
                <span class="texto-azul"> atirador nivel 10<span>
            </td>
            </tr>
            <tr>
                <td >
                    <img src="https://static.wikia.nocookie.net/callofduty/images/b/b4/Ghost_Infobox_2023_MWIII.png/revision/latest?cb=20231118184755" border="3" alt="avatar">
                </td>
                <td>
                    Força: 20.4<br>
                    agilidade: 30.0<br>
                    perks: "atirador de elite" nivel 10, "stealth ghost" nivel 20
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
